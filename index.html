<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>DeepSeek风格·智能对话工作台 | 流式+联网+主题切换</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        /* 主题变量 - 浅色默认 */
        :root {
            --bg-sidebar: rgba(245, 247, 250, 0.95);
            --bg-main: #ffffff;
            --border-color: #e5e9f0;
            --text-primary: #1f2a3e;
            --text-secondary: #4a5568;
            --message-user-bg: #eef2ff;
            --message-assistant-bg: #f8fafc;
            --hover-bg: #f1f5f9;
            --active-bg: #e0e7ff;
            --input-bg: #ffffff;
            --sidebar-text: #1e293b;
            --drawer-bg: rgba(255,255,255,0.98);
            --shadow-sm: 0 1px 2px rgba(0,0,0,0.05);
        }

        body.dark {
            --bg-sidebar: rgba(18, 24, 34, 0.92);
            --bg-main: #0f1117;
            --border-color: #2d3748;
            --text-primary: #e2e8f0;
            --text-secondary: #94a3b8;
            --message-user-bg: #2d3a5e;
            --message-assistant-bg: #1e293b;
            --hover-bg: #1e2a3a;
            --active-bg: #2d3a5e;
            --input-bg: #1a1e2a;
            --sidebar-text: #e2e8f0;
            --drawer-bg: rgba(18, 24, 34, 0.98);
            --shadow-sm: 0 1px 2px rgba(0,0,0,0.2);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: var(--bg-main);
            color: var(--text-primary);
            height: 100vh;
            overflow: hidden;
            transition: background 0.2s, color 0.2s;
        }

        /* 布局 */
        .app-layout {
            display: flex;
            height: 100vh;
            width: 100%;
        }

        /* 左侧会话面板 */
        .sidebar {
            width: 280px;
            background: var(--bg-sidebar);
            backdrop-filter: blur(12px);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            transition: background 0.2s;
        }

        .sidebar-header {
            padding: 20px 16px;
            border-bottom: 1px solid var(--border-color);
        }

        .new-chat-btn {
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            border: none;
            border-radius: 40px;
            padding: 10px 16px;
            width: 100%;
            font-weight: 600;
            font-size: 0.9rem;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            cursor: pointer;
            transition: 0.2s;
        }
        .new-chat-btn:hover { transform: translateY(-1px); filter: brightness(1.05); }

        .sessions-list {
            flex: 1;
            overflow-y: auto;
            padding: 12px 8px;
        }

        .session-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 12px;
            border-radius: 14px;
            margin-bottom: 4px;
            cursor: pointer;
            transition: all 0.15s;
            background: transparent;
            color: var(--text-primary);
        }
        .session-item:hover { background: var(--hover-bg); }
        .session-item.active { background: var(--active-bg); }
        .session-title {
            flex: 1;
            font-size: 0.85rem;
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .session-delete {
            opacity: 0;
            background: none;
            border: none;
            color: #f87171;
            cursor: pointer;
            font-size: 0.9rem;
            padding: 4px;
            border-radius: 8px;
        }
        .session-item:hover .session-delete { opacity: 1; }
        .session-delete:hover { background: rgba(248,113,113,0.2); }

        /* 右侧主聊天区 */
        .main-chat {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--bg-main);
            position: relative;
        }

        .chat-header {
            padding: 14px 24px;
            background: var(--bg-main);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        .model-indicator {
            background: var(--hover-bg);
            border-radius: 40px;
            padding: 5px 12px;
            font-size: 0.75rem;
            font-weight: 500;
        }
        .theme-toggle, .settings-icon {
            background: transparent;
            border: none;
            width: 36px;
            height: 36px;
            border-radius: 40px;
            font-size: 1.2rem;
            cursor: pointer;
            transition: 0.2s;
            color: var(--text-secondary);
        }
        .theme-toggle:hover, .settings-icon:hover {
            background: var(--hover-bg);
            color: var(--text-primary);
        }

        /* 消息区域 */
        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 24px 20px;
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
            scroll-behavior: smooth;
        }

        .message {
            display: flex;
            gap: 12px;
            max-width: 85%;
            animation: fadeIn 0.2s ease;
        }
        .message.user { align-self: flex-end; flex-direction: row-reverse; }
        .message.assistant { align-self: flex-start; }
        .message-avatar {
            width: 34px;
            height: 34px;
            background: var(--hover-bg);
            border-radius: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            flex-shrink: 0;
        }
        .message.user .message-avatar { background: #3b82f6; color: white; }
        .message.assistant .message-avatar { background: #10b981; color: white; }
        .message-content-wrapper { position: relative; max-width: 100%; }
        .message-content {
            background: var(--message-assistant-bg);
            padding: 10px 16px;
            border-radius: 20px;
            font-size: 0.9rem;
            line-height: 1.5;
            word-break: break-word;
            white-space: pre-wrap;
        }
        .message.user .message-content { background: var(--message-user-bg); border-bottom-right-radius: 6px; }
        .message.assistant .message-content { border-bottom-left-radius: 6px; }
        .message-actions {
            position: absolute;
            bottom: -26px;
            right: 8px;
            display: flex;
            gap: 8px;
            opacity: 0;
            transition: opacity 0.1s;
        }
        .message.user .message-actions { right: auto; left: 8px; }
        .message:hover .message-actions { opacity: 1; }
        .action-btn {
            background: var(--hover-bg);
            border: none;
            color: var(--text-secondary);
            font-size: 0.7rem;
            padding: 4px 8px;
            border-radius: 20px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }
        .action-btn:hover { background: #3b82f6; color: white; }
        .recall-btn:hover { background: #ef4444; }

        /* 输入区域 */
        .input-area {
            padding: 20px 24px 24px;
            border-top: 1px solid var(--border-color);
            background: var(--bg-main);
        }
        .input-wrapper {
            display: flex;
            gap: 12px;
            background: var(--input-bg);
            border-radius: 28px;
            padding: 6px 6px 6px 18px;
            border: 1px solid var(--border-color);
        }
        .input-wrapper textarea {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--text-primary);
            font-family: inherit;
            font-size: 0.9rem;
            padding: 12px 0;
            resize: none;
            outline: none;
            max-height: 120px;
        }
        .send-button {
            background: #3b82f6;
            border: none;
            border-radius: 40px;
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            cursor: pointer;
            transition: 0.2s;
        }
        .send-button:disabled { opacity: 0.5; cursor: not-allowed; }
        .input-options {
            display: flex;
            justify-content: space-between;
            margin-top: 8px;
            padding: 0 12px;
        }
        .web-search-toggle {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.75rem;
            cursor: pointer;
            color: var(--text-secondary);
        }
        .web-search-toggle input { cursor: pointer; }

        /* 抽屉 */
        .drawer {
            position: fixed;
            top: 0;
            right: -420px;
            width: 380px;
            height: 100%;
            background: var(--drawer-bg);
            backdrop-filter: blur(20px);
            border-left: 1px solid var(--border-color);
            transition: right 0.3s ease;
            z-index: 200;
            padding: 24px 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            box-shadow: -5px 0 30px rgba(0,0,0,0.3);
        }
        .drawer.open { right: 0; }
        .drawer-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 1.2rem;
            font-weight: 600;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 12px;
        }
        .drawer-close {
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: var(--text-secondary);
        }
        .config-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .config-group label {
            font-size: 0.75rem;
            font-weight: 500;
            color: var(--text-secondary);
        }
        .config-group input, .config-group select {
            background: var(--input-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 10px 14px;
            color: var(--text-primary);
            font-size: 0.85rem;
            outline: none;
        }
        .model-row {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        .load-model-btn {
            background: var(--hover-bg);
            border: none;
            border-radius: 40px;
            padding: 8px 14px;
            cursor: pointer;
            font-size: 0.75rem;
            color: var(--text-primary);
        }
        .status-tip {
            font-size: 0.7rem;
            color: #86efac;
        }
        .overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(2px);
            z-index: 150;
            display: none;
        }
        .overlay.active { display: block; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(6px);}
            to { opacity: 1; transform: translateY(0);}
        }

        /* 滚动条 */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: var(--hover-bg); }
        ::-webkit-scrollbar-thumb { background: #3b82f6; border-radius: 10px; }

        @media (max-width: 700px) {
            .sidebar { width: 70px; }
            .sidebar .session-title { display: none; }
            .new-chat-btn span:first-child { display: none; }
            .drawer { width: 90%; right: -90%; }
        }
    </style>
</head>
<body>
<div class="app-layout">
    <div class="sidebar">
        <div class="sidebar-header">
            <button class="new-chat-btn" id="newChatBtn"><i class="fas fa-plus"></i><span>新建对话</span></button>
        </div>
        <div class="sessions-list" id="sessionsList"></div>
    </div>
    <div class="main-chat">
        <div class="chat-header">
            <div class="header-left">
                <div class="model-indicator" id="modelIndicator">🤖 模型: gpt-3.5-turbo</div>
                <label class="web-search-toggle" id="webSearchLabel">
                    <input type="checkbox" id="webSearchCheckbox"> <i class="fas fa-globe"></i> 联网搜索
                </label>
            </div>
            <div style="display: flex; gap: 8px;">
                <button class="theme-toggle" id="themeToggleBtn"><i class="fas fa-moon"></i></button>
                <button class="settings-icon" id="openSettingsBtn"><i class="fas fa-sliders-h"></i></button>
            </div>
        </div>
        <div class="messages-container" id="messagesContainer"></div>
        <div class="input-area">
            <div class="input-wrapper">
                <textarea id="messageInput" rows="1" placeholder="发送消息... (Enter 发送，Shift+Enter 换行)"></textarea>
                <button class="send-button" id="sendBtn"><i class="fas fa-paper-plane"></i></button>
            </div>
            <div class="input-options">
                <span style="font-size:0.7rem; color: var(--text-secondary);">💡 支持流式输出 · 可撤回消息</span>
            </div>
        </div>
    </div>
</div>
<div class="overlay" id="drawerOverlay"></div>
<div class="drawer" id="configDrawer">
    <div class="drawer-header">
        <span><i class="fas fa-cog"></i> API 配置</span>
        <button class="drawer-close" id="closeDrawerBtn"><i class="fas fa-times"></i></button>
    </div>
    <div class="config-group">
        <label>🔌 API 地址</label>
        <input type="text" id="apiBaseUrl" placeholder="https://api.openai.com/v1" value="https://api.openai.com/v1">
    </div>
    <div class="config-group">
        <label>🔑 API 密钥</label>
        <input type="password" id="apiKey" placeholder="sk-...">
    </div>
    <div class="config-group">
        <label>🤖 模型选择</label>
        <div class="model-row">
            <select id="modelSelect"></select>
            <button class="load-model-btn" id="loadModelsBtn"><i class="fas fa-sync-alt"></i> 加载列表</button>
        </div>
        <input type="text" id="customModel" placeholder="或手动输入模型名" value="gpt-3.5-turbo">
    </div>
    <div class="config-group">
        <label>🧠 系统指令 (角色设定)</label>
        <input type="text" id="systemPrompt" placeholder="例如: 你是一位专业AI助手" value="你是一位乐于助人的AI助手。">
    </div>
    <div class="status-tip" id="configStatus">💡 配置自动保存，支持流式输出</div>
</div>

<script>
    // ========== 全局状态 ==========
    let sessions = [];          // { id, title, messages: [{role, content}] }
    let currentSessionId = null;
    let isLoading = false;
    let abortController = null;
    let currentStreamingMessageId = null;   // 用于流式更新占位消息

    // DOM 元素
    const sessionsListDiv = document.getElementById('sessionsList');
    const messagesContainer = document.getElementById('messagesContainer');
    const messageInput = document.getElementById('messageInput');
    const sendBtn = document.getElementById('sendBtn');
    const newChatBtn = document.getElementById('newChatBtn');
    const openSettingsBtn = document.getElementById('openSettingsBtn');
    const closeDrawerBtn = document.getElementById('closeDrawerBtn');
    const drawerOverlay = document.getElementById('drawerOverlay');
    const configDrawer = document.getElementById('configDrawer');
    const apiBaseUrlInput = document.getElementById('apiBaseUrl');
    const apiKeyInput = document.getElementById('apiKey');
    const modelSelect = document.getElementById('modelSelect');
    const customModelInput = document.getElementById('customModel');
    const loadModelsBtn = document.getElementById('loadModelsBtn');
    const systemPromptInput = document.getElementById('systemPrompt');
    const modelIndicator = document.getElementById('modelIndicator');
    const configStatusSpan = document.getElementById('configStatus');
    const themeToggleBtn = document.getElementById('themeToggleBtn');
    const webSearchCheckbox = document.getElementById('webSearchCheckbox');

    // ========== 存储操作 ==========
    function saveAllData() {
        localStorage.setItem('deepseek_clone_sessions', JSON.stringify(sessions));
        localStorage.setItem('deepseek_clone_currentSessionId', currentSessionId);
        localStorage.setItem('openai_custom_baseurl', apiBaseUrlInput.value);
        localStorage.setItem('openai_custom_apikey', apiKeyInput.value);
        localStorage.setItem('openai_custom_customModel', customModelInput.value);
        localStorage.setItem('openai_custom_systemPrompt', systemPromptInput.value);
        localStorage.setItem('theme_preference', document.body.classList.contains('dark') ? 'dark' : 'light');
        localStorage.setItem('web_search_enabled', webSearchCheckbox.checked);
    }

    function loadAllData() {
        const savedSessions = localStorage.getItem('deepseek_clone_sessions');
        if (savedSessions) sessions = JSON.parse(savedSessions);
        else {
            const defaultId = Date.now().toString();
            sessions = [{ id: defaultId, title: '新对话', messages: [] }];
            currentSessionId = defaultId;
        }
        const savedCurr = localStorage.getItem('deepseek_clone_currentSessionId');
        if (savedCurr && sessions.find(s => s.id === savedCurr)) currentSessionId = savedCurr;
        else if (sessions.length) currentSessionId = sessions[0].id;

        const savedUrl = localStorage.getItem('openai_custom_baseurl');
        const savedKey = localStorage.getItem('openai_custom_apikey');
        const savedModel = localStorage.getItem('openai_custom_customModel');
        const savedSys = localStorage.getItem('openai_custom_systemPrompt');
        if (savedUrl) apiBaseUrlInput.value = savedUrl;
        if (savedKey) apiKeyInput.value = savedKey;
        if (savedModel) customModelInput.value = savedModel;
        if (savedSys) systemPromptInput.value = savedSys;
        if (!customModelInput.value.trim()) customModelInput.value = "gpt-3.5-turbo";

        // 主题恢复
        const savedTheme = localStorage.getItem('theme_preference');
        if (savedTheme === 'dark') document.body.classList.add('dark');
        else document.body.classList.remove('dark');
        updateThemeIcon();

        const savedWeb = localStorage.getItem('web_search_enabled');
        if (savedWeb !== null) webSearchCheckbox.checked = savedWeb === 'true';
        updateModelIndicator();
    }

    function updateModelIndicator() {
        let model = customModelInput.value.trim();
        if (!model && modelSelect.value) model = modelSelect.value;
        if (!model) model = "未设置";
        modelIndicator.innerHTML = `🤖 模型: ${model}`;
    }

    function updateThemeIcon() {
        const isDark = document.body.classList.contains('dark');
        themeToggleBtn.innerHTML = isDark ? '<i class="fas fa-sun"></i>' : '<i class="fas fa-moon"></i>';
    }

    function toggleTheme() {
        document.body.classList.toggle('dark');
        updateThemeIcon();
        saveAllData();
    }

    // 会话管理
    function renderSessions() {
        sessionsListDiv.innerHTML = '';
        sessions.forEach(session => {
            const div = document.createElement('div');
            div.className = `session-item ${session.id === currentSessionId ? 'active' : ''}`;
            div.innerHTML = `
                <span class="session-title">${escapeHtml(session.title || '未命名对话')}</span>
                <button class="session-delete" data-id="${session.id}"><i class="fas fa-trash-alt"></i></button>
            `;
            div.addEventListener('click', (e) => { if (!e.target.closest('.session-delete')) switchSession(session.id); });
            div.querySelector('.session-delete').addEventListener('click', (e) => { e.stopPropagation(); deleteSession(session.id); });
            sessionsListDiv.appendChild(div);
        });
    }

    function switchSession(id) {
        if (currentSessionId === id) return;
        if (isLoading) { alert("请等待当前消息发送完成"); return; }
        currentSessionId = id;
        renderSessions();
        renderMessages();
        saveAllData();
    }

    function deleteSession(id) {
        if (sessions.length === 1) { alert("至少保留一个对话"); return; }
        const index = sessions.findIndex(s => s.id === id);
        if (index !== -1) {
            sessions.splice(index, 1);
            if (currentSessionId === id) currentSessionId = sessions[0].id;
            renderSessions();
            renderMessages();
            saveAllData();
        }
    }

    function newSession() {
        if (isLoading) { alert("请等待当前请求完成"); return; }
        const newId = Date.now().toString();
        sessions.unshift({ id: newId, title: '新对话', messages: [] });
        currentSessionId = newId;
        renderSessions();
        renderMessages();
        saveAllData();
    }

    // 渲染消息（包括流式占位）
    function renderMessages() {
        const session = sessions.find(s => s.id === currentSessionId);
        if (!session) return;
        messagesContainer.innerHTML = '';
        if (session.messages.length === 0) {
            const emptyDiv = document.createElement('div');
            emptyDiv.className = 'message assistant';
            emptyDiv.innerHTML = `<div class="message-avatar"><i class="fas fa-robot"></i></div><div class="message-content-wrapper"><div class="message-content">👋 你好！配置好API密钥后即可开始对话，支持流式输出和联网搜索开关。</div></div>`;
            messagesContainer.appendChild(emptyDiv);
        } else {
            session.messages.forEach((msg, idx) => {
                const msgDiv = document.createElement('div');
                msgDiv.className = `message ${msg.role}`;
                const avatar = msg.role === 'user' ? '<i class="fas fa-user"></i>' : '<i class="fas fa-robot"></i>';
                msgDiv.innerHTML = `
                    <div class="message-avatar">${avatar}</div>
                    <div class="message-content-wrapper">
                        <div class="message-content">${escapeHtml(msg.content)}</div>
                        <div class="message-actions">
                            <button class="action-btn copy-btn" data-msg="${escapeHtml(msg.content).replace(/"/g, '&quot;')}"><i class="fas fa-copy"></i> 复制</button>
                            ${msg.role === 'user' ? `<button class="action-btn recall-btn" data-msg-idx="${idx}"><i class="fas fa-undo-alt"></i> 撤回</button>` : ''}
                        </div>
                    </div>
                `;
                messagesContainer.appendChild(msgDiv);
            });
        }
        attachMessageActions();
        messagesContainer.scrollTop = messagesContainer.scrollHeight;
    }

    function attachMessageActions() {
        document.querySelectorAll('.copy-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const text = btn.getAttribute('data-msg');
                navigator.clipboard.writeText(text);
                setConfigStatus("✅ 已复制", false);
            });
        });
        document.querySelectorAll('.recall-btn').forEach(btn => {
            btn.addEventListener('click', async (e) => {
                if (isLoading) { alert("请等待当前请求完成"); return; }
                const idx = parseInt(btn.getAttribute('data-msg-idx'));
                const session = sessions.find(s => s.id === currentSessionId);
                if (session && session.messages[idx]?.role === 'user') {
                    session.messages.splice(idx);
                    renderMessages();
                    saveAllData();
                    setConfigStatus("已撤回该消息及后续回复", false);
                }
            });
        });
    }

    function addMessageToCurrent(role, content) {
        const session = sessions.find(s => s.id === currentSessionId);
        if (!session) return;
        session.messages.push({ role, content });
        if (role === 'user' && session.messages.length === 1) {
            let newTitle = content.slice(0, 20);
            if (newTitle.length < content.length) newTitle += '...';
            session.title = newTitle;
        }
        renderMessages();
        saveAllData();
    }

    // 流式发送消息
    async function sendMessageStream(userMessage) {
        const baseUrl = apiBaseUrlInput.value.trim();
        const apiKey = apiKeyInput.value.trim();
        let model = customModelInput.value.trim();
        if (!model && modelSelect.value) model = modelSelect.value;
        if (!model) { setConfigStatus("请填写或选择模型", true); return false; }
        if (!baseUrl) { setConfigStatus("请填写 API 地址", true); return false; }
        if (!apiKey) { setConfigStatus("请填写 API 密钥", true); return false; }

        const endpoint = baseUrl.replace(/\/+$/, '') + '/chat/completions';
        const session = sessions.find(s => s.id === currentSessionId);
        const messagesPayload = [];
        const sysPrompt = systemPromptInput.value.trim();
        if (sysPrompt) messagesPayload.push({ role: 'system', content: sysPrompt });
        for (let msg of session.messages) messagesPayload.push({ role: msg.role, content: msg.content });
        messagesPayload.push({ role: 'user', content: userMessage });

        const requestBody = {
            model: model,
            messages: messagesPayload,
            temperature: 0.7,
            max_tokens: 1500,
            stream: true
        };
        // 如果开启联网搜索，添加自定义参数（根据服务商可能需要调整字段，这里添加 web_search 通用字段）
        if (webSearchCheckbox.checked) {
            requestBody.web_search = true;   // 部分兼容服务支持
            requestBody.enable_search = true; // 双重兼容
        }

        isLoading = true;
        sendBtn.disabled = true;
        const controller = new AbortController();
        abortController = controller;
        const timeoutId = setTimeout(() => controller.abort(), 65000);

        try {
            const response = await fetch(endpoint, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${apiKey}`
                },
                body: JSON.stringify(requestBody),
                signal: controller.signal
            });
            clearTimeout(timeoutId);
            if (!response.ok) {
                let errText = await response.text();
                throw new Error(`API错误 (${response.status}): ${errText.slice(0,100)}`);
            }

            // 先添加用户消息到界面和历史
            addMessageToCurrent('user', userMessage);
            // 创建一个临时占位消息用于流式更新
            const sessionNow = sessions.find(s => s.id === currentSessionId);
            const assistantPlaceholder = { role: 'assistant', content: '' };
            sessionNow.messages.push(assistantPlaceholder);
            const lastIndex = sessionNow.messages.length - 1;
            renderMessages();  // 显示空占位

            const reader = response.body.getReader();
            const decoder = new TextDecoder('utf-8');
            let fullContent = '';
            let buffer = '';

            while (true) {
                const { done, value } = await reader.read();
                if (done) break;
                buffer += decoder.decode(value, { stream: true });
                const lines = buffer.split('\n');
                buffer = lines.pop(); // 保留不完整行
                for (const line of lines) {
                    const trimmed = line.trim();
                    if (!trimmed || trimmed === 'data: [DONE]') continue;
                    if (trimmed.startsWith('data: ')) {
                        try {
                            const jsonStr = trimmed.slice(6);
                            const chunk = JSON.parse(jsonStr);
                            const delta = chunk.choices[0]?.delta?.content;
                            if (delta) {
                                fullContent += delta;
                                // 更新占位消息内容
                                const currSession = sessions.find(s => s.id === currentSessionId);
                                if (currSession && currSession.messages[lastIndex]) {
                                    currSession.messages[lastIndex].content = fullContent;
                                    // 只更新对应消息DOM（重新渲染全部会闪烁，但为保证简单，重新渲染）
                                    renderMessages();
                                }
                            }
                        } catch (e) { console.warn("解析chunk出错", e); }
                    }
                }
            }
            // 最终确保内容完整
            const finalSession = sessions.find(s => s.id === currentSessionId);
            if (finalSession && finalSession.messages[lastIndex] && !finalSession.messages[lastIndex].content) {
                finalSession.messages[lastIndex].content = fullContent || "(空回复)";
                renderMessages();
            }
            saveAllData();
            return true;
        } catch (err) {
            let errMsg = err.message;
            if (err.name === 'AbortError') errMsg = "请求超时，请检查网络/端点";
            setConfigStatus(`发送失败: ${errMsg}`, true);
            // 移除可能残留的占位消息
            const sess = sessions.find(s => s.id === currentSessionId);
            if (sess && sess.messages.length && sess.messages[sess.messages.length-1]?.role === 'assistant' && sess.messages[sess.messages.length-1]?.content === '') {
                sess.messages.pop();
                renderMessages();
            }
            return false;
        } finally {
            isLoading = false;
            sendBtn.disabled = false;
            abortController = null;
        }
    }

    async function onSend() {
        if (isLoading) { setConfigStatus("正在处理中...", true); return; }
        const raw = messageInput.value.trim();
        if (!raw) return;
        messageInput.value = '';
        const success = await sendMessageStream(raw);
        if (!success) messageInput.value = raw;
        messageInput.focus();
    }

    // 加载模型列表
    async function loadModels() {
        const baseUrl = apiBaseUrlInput.value.trim();
        const apiKey = apiKeyInput.value.trim();
        if (!baseUrl) { setConfigStatus("请先填写 API 地址", true); return; }
        if (!apiKey) { setConfigStatus("请先填写 API 密钥", true); return; }
        const modelsUrl = baseUrl.replace(/\/+$/, '') + '/models';
        setConfigStatus("正在加载模型列表...");
        loadModelsBtn.disabled = true;
        try {
            const res = await fetch(modelsUrl, {
                headers: { 'Authorization': `Bearer ${apiKey}` },
                signal: AbortSignal.timeout(10000)
            });
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            const data = await res.json();
            let models = [];
            if (data.data) models = data.data.map(m => m.id);
            else if (data.models) models = data.models.map(m => m.id);
            if (!models.length) throw new Error("无模型数据");
            modelSelect.innerHTML = '<option value="">选择模型</option>';
            models.forEach(m => {
                const opt = document.createElement('option');
                opt.value = m;
                opt.textContent = m;
                modelSelect.appendChild(opt);
            });
            setConfigStatus(`✅ 加载 ${models.length} 个模型，点击下拉选择`, false);
            modelSelect.onchange = () => {
                if (modelSelect.value) customModelInput.value = modelSelect.value;
                updateModelIndicator();
                saveAllData();
            };
        } catch (err) {
            setConfigStatus(`加载失败: ${err.message}`, true);
        } finally {
            loadModelsBtn.disabled = false;
        }
    }

    function setConfigStatus(msg, isErr) {
        configStatusSpan.innerHTML = isErr ? `⚠️ ${msg}` : `✨ ${msg}`;
        if (!isErr) setTimeout(() => {
            if (configStatusSpan.innerHTML.includes(msg)) configStatusSpan.innerHTML = "💡 配置自动保存";
        }, 2500);
    }

    function openDrawer() { configDrawer.classList.add('open'); drawerOverlay.classList.add('active'); }
    function closeDrawer() { configDrawer.classList.remove('open'); drawerOverlay.classList.remove('active'); saveAllData(); updateModelIndicator(); }

    function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, function(m) { if (m === '&') return '&amp;'; if (m === '<') return '&lt;'; if (m === '>') return '&gt;'; return m; }); }

    function bindEvents() {
        sendBtn.addEventListener('click', onSend);
        newChatBtn.addEventListener('click', newSession);
        openSettingsBtn.addEventListener('click', openDrawer);
        closeDrawerBtn.addEventListener('click', closeDrawer);
        drawerOverlay.addEventListener('click', closeDrawer);
        loadModelsBtn.addEventListener('click', loadModels);
        themeToggleBtn.addEventListener('click', toggleTheme);
        messageInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); if (!isLoading) onSend(); }
        });
        [apiBaseUrlInput, apiKeyInput, customModelInput, systemPromptInput, webSearchCheckbox].forEach(inp => {
            inp.addEventListener('input', () => { saveAllData(); updateModelIndicator(); });
            inp.addEventListener('change', () => { saveAllData(); updateModelIndicator(); });
        });
    }

    function init() {
        loadAllData();
        bindEvents();
        renderSessions();
        renderMessages();
        updateModelIndicator();
    }
    init();
</script>
