<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>给妈妈的宇宙级生日礼物</title>

<style>
body{
  margin:0;
  overflow:hidden;
  font-family:"Microsoft YaHei";
  background:black;
  color:white;
}

/* 星空 */
canvas{
  position:fixed;
  top:0;
  left:0;
  z-index:-1;
}

/* 中间内容 */
.center{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  text-align:center;
}

h1{
  font-size:32px;
  margin-bottom:20px;
  animation:fade 2s;
}

p{
  font-size:18px;
  line-height:1.6;
}

button{
  padding:12px 30px;
  border:none;
  border-radius:30px;
  background:#ff4d6d;
  color:white;
  font-size:16px;
  cursor:pointer;
}

.hidden{
  display:none;
}

.heart{
  font-size:50px;
  animation:beat 1s infinite;
}

@keyframes beat{
  0%{transform:scale(1);}
  50%{transform:scale(1.3);}
  100%{transform:scale(1);}
}

@keyframes fade{
  from{opacity:0;}
  to{opacity:1;}
}
</style>
</head>

<body>

<canvas id="stars"></canvas>

<div class="center" id="page1">
  <h1>妈妈 🌌</h1>
  <p>在这个宇宙里，有很多星星<br>但你是我唯一的光</p>
  <button onclick="next(1)">继续</button>
</div>

<div class="center hidden" id="page2">
  <h1>从小到大</h1>
  <p id="typing"></p>
  <button onclick="next(2)">我想说</button>
</div>

<div class="center hidden" id="page3">
  <h1>今天是你的生日 🎂</h1>
  <p>我可能不太会表达<br>但我一直都记得你为我做的一切</p>
  <button onclick="next(3)">点这里</button>
</div>

<div class="center hidden" id="page4">
  <div class="heart">❤️</div>
  <h1>妈妈，我爱你</h1>
  <p>愿你被世界温柔以待<br>愿我以后能成为你的依靠</p>
</div>

<script>
/* 星空 */
const canvas = document.getElementById("stars");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let stars = [];
for(let i=0;i<200;i++){
  stars.push({
    x:Math.random()*canvas.width,
    y:Math.random()*canvas.height,
    r:Math.random()*2
  });
}

function drawStars(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle="white";
  stars.forEach(s=>{
    ctx.beginPath();
    ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
    ctx.fill();
  });
}
setInterval(drawStars,50);

/* 页面切换 */
function next(step){
  document.getElementById("page"+step).classList.add("hidden");
  document.getElementById("page"+(step+1)).classList.remove("hidden");

  if(step==1){
    typeText();
  }
}

/* 打字机效果 */
function typeText(){
  const text = "你陪我长大\n你为我操心\n你总是把最好的给我\n而我却很少说谢谢\n但其实我一直都知道 ❤️";
  let i=0;
  const el = document.getElementById("typing");

  function typing(){
    if(i<text.length){
      el.innerHTML += text.charAt(i)=="\n"?"<br>":text.charAt(i);
      i++;
      setTimeout(typing,80);
    }
  }
  typing();
}
</script>

</body>
</html>
