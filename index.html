<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>DeepSeek 对话平台 · 深度思考 + 多模型</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        /* 主题变量（同前，保持不变） */
        :root {
            --bg-sidebar: #f7f7f8;
            --bg-main: #ffffff;
            --border-light: #e5e5e5;
            --text-primary: #1a1a1a;
            --text-secondary: #5a5a5a;
            --message-user-bg: #e9ecef;
            --message-assistant-bg: #f8f9fa;
            --hover-bg: #f1f3f5;
            --active-bg: #e9ecef;
            --input-bg: #ffffff;
            --drawer-bg: #ffffff;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
        }
        body.dark {
            --bg-sidebar: #1e1e2a;
            --bg-main: #18181c;
            --border-light: #2c2c36;
            --text-primary: #eaeef2;
            --text-secondary: #9ca3af;
            --message-user-bg: #2a2a36;
            --message-assistant-bg: #22222c;
            --hover-bg: #2c2c38;
            --active-bg: #3a3a48;
            --input-bg: #2c2c36;
            --drawer-bg: #1e1e2a;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: var(--bg-main);
            color: var(--text-primary);
            height: 100vh;
            overflow: hidden;
            transition: background 0.2s, color 0.2s;
        }
        .app-layout { display: flex; height: 100vh; width: 100%; position: relative; }
        /* 左侧侧边栏（桌面端可折叠） */
        .sidebar {
            width: 280px;
            background: var(--bg-sidebar);
            border-right: 1px solid var(--border-light);
            display: flex;
            flex-direction: column;
            transition: width 0.2s ease;
            flex-shrink: 0;
            overflow-x: hidden;
        }
        .sidebar.collapsed { width: 60px; }
        .sidebar-header {
            padding: 16px;
            border-bottom: 1px solid var(--border-light);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .new-chat-btn {
            background: var(--accent);
            border: none;
            border-radius: 40px;
            padding: 10px 16px;
            flex: 1;
            font-weight: 500;
            font-size: 0.85rem;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            cursor: pointer;
            transition: 0.2s;
            margin-right: 8px;
        }
        .sidebar.collapsed .new-chat-btn span { display: none; }
        .sidebar.collapsed .new-chat-btn { padding: 10px; margin-right: 0; }
        .toggle-sidebar-btn {
            background: transparent;
            border: none;
            cursor: pointer;
            color: var(--text-secondary);
            font-size: 1.2rem;
            width: 32px;
            height: 32px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        .toggle-sidebar-btn:hover { background: var(--hover-bg); }
        .sessions-list {
            flex: 1;
            overflow-y: auto;
            padding: 12px 8px;
        }
        .session-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 12px;
            border-radius: 12px;
            margin-bottom: 4px;
            cursor: pointer;
            transition: 0.1s;
            color: var(--text-primary);
        }
        .session-item:hover { background: var(--hover-bg); }
        .session-item.active { background: var(--active-bg); }
        .session-title {
            flex: 1;
            font-size: 0.85rem;
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .sidebar.collapsed .session-title { display: none; }
        .session-delete {
            opacity: 0;
            background: none;
            border: none;
            color: #e5484d;
            cursor: pointer;
            font-size: 0.8rem;
            padding: 4px;
            border-radius: 6px;
        }
        .session-item:hover .session-delete { opacity: 1; }
        /* 左侧底部只保留API配置按钮 */
        .sidebar-footer {
            padding: 16px;
            border-top: 1px solid var(--border-light);
        }
        .api-config-btn {
            width: 100%;
            background: transparent;
            border: 1px solid var(--border-light);
            border-radius: 40px;
            padding: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            cursor: pointer;
            color: var(--text-primary);
            transition: 0.2s;
        }
        .api-config-btn:hover { background: var(--hover-bg); }
        .sidebar.collapsed .api-config-btn span { display: none; }
        .sidebar.collapsed .api-config-btn { padding: 8px; }
        /* 移动端覆盖式菜单 */
        .mobile-menu-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 200;
            display: none;
            backdrop-filter: blur(2px);
        }
        .mobile-sidebar {
            position: fixed;
            top: 0;
            left: -80%;
            width: 80%;
            max-width: 320px;
            height: 100%;
            background: var(--bg-sidebar);
            border-right: 1px solid var(--border-light);
            z-index: 201;
            display: flex;
            flex-direction: column;
            transition: left 0.3s ease;
        }
        .mobile-sidebar.open { left: 0; }
        .mobile-sidebar .sidebar-header { padding: 16px; }
        .mobile-menu-btn {
            display: none;
            position: fixed;
            top: 12px;
            left: 12px;
            z-index: 20;
            background: var(--bg-main);
            border: 1px solid var(--border-light);
            border-radius: 40px;
            width: 40px;
            height: 40px;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: var(--text-primary);
            font-size: 1.2rem;
        }
        /* 右侧主聊天区 */
        .main-chat {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--bg-main);
            position: relative;
        }
        .chat-header {
            padding: 12px 24px;
            border-bottom: 1px solid var(--border-light);
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
        }
        .model-badge {
            background: var(--hover-bg);
            border-radius: 20px;
            padding: 6px 14px;
            font-size: 0.8rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .header-right {
            display: flex;
            gap: 8px;
        }
        .icon-btn {
            background: transparent;
            border: none;
            width: 36px;
            height: 36px;
            border-radius: 40px;
            font-size: 1.1rem;
            cursor: pointer;
            color: var(--text-secondary);
            transition: 0.2s;
        }
        .icon-btn:hover { background: var(--hover-bg); color: var(--text-primary); }
        /* 消息区域（样式保持不变） */
        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 24px 20px;
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
            scroll-behavior: smooth;
        }
        .message {
            display: flex;
            gap: 12px;
            max-width: 85%;
            animation: fadeIn 0.2s ease;
        }
        .message.user { align-self: flex-end; flex-direction: row-reverse; }
        .message.assistant { align-self: flex-start; width: 100%; max-width: 90%; }
        .message-avatar {
            width: 34px;
            height: 34px;
            background: var(--hover-bg);
            border-radius: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            flex-shrink: 0;
        }
        .message.user .message-avatar { background: var(--accent); color: white; }
        .message.assistant .message-avatar { background: #10b981; color: white; }
        .message-content-wrapper { position: relative; max-width: 100%; flex: 1; }
        .message-content {
            background: var(--message-assistant-bg);
            padding: 10px 16px;
            border-radius: 18px;
            font-size: 0.9rem;
            line-height: 1.5;
            word-break: break-word;
            white-space: pre-wrap;
        }
        .message.user .message-content { background: var(--message-user-bg); border-bottom-right-radius: 6px; }
        .message.assistant .message-content { border-bottom-left-radius: 6px; }
        .thinking-block {
            background: var(--hover-bg);
            border-left: 3px solid #f59e0b;
            padding: 8px 12px;
            margin-bottom: 8px;
            border-radius: 12px;
            font-size: 0.8rem;
            color: var(--text-secondary);
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .thinking-content {
            flex: 1;
            white-space: pre-wrap;
        }
        .thinking-toggle {
            background: none;
            border: none;
            cursor: pointer;
            color: var(--text-secondary);
            font-size: 0.7rem;
        }
        .thinking-content.collapsed { display: none; }
        .thinking-time {
            font-size: 0.7rem;
            color: var(--text-secondary);
            margin-top: 4px;
            padding-left: 4px;
        }
        .message-actions {
            position: absolute;
            bottom: -26px;
            right: 8px;
            display: flex;
            gap: 8px;
            opacity: 0;
            transition: opacity 0.1s;
        }
        .message.user .message-actions { right: auto; left: 8px; }
        .message:hover .message-actions { opacity: 1; }
        .action-btn {
            background: var(--hover-bg);
            border: none;
            color: var(--text-secondary);
            font-size: 0.7rem;
            padding: 4px 8px;
            border-radius: 20px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }
        .action-btn:hover { background: var(--accent); color: white; }
        .recall-btn:hover { background: #ef4444; }
        .regenerate-btn:hover { background: #f59e0b; }
        /* 输入区域 */
        .input-area {
            padding: 16px 24px 24px;
            border-top: 1px solid var(--border-light);
            background: var(--bg-main);
        }
        .input-options {
            display: flex;
            gap: 16px;
            margin-bottom: 12px;
            padding: 0 8px;
        }
        .option-switch {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.75rem;
            color: var(--text-secondary);
            cursor: pointer;
        }
        .option-switch input { cursor: pointer; width: 16px; height: 16px; }
        .input-wrapper {
            display: flex;
            gap: 12px;
            background: var(--input-bg);
            border-radius: 28px;
            padding: 6px 6px 6px 18px;
            border: 1px solid var(--border-light);
        }
        .input-wrapper textarea {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--text-primary);
            font-family: inherit;
            font-size: 0.9rem;
            padding: 12px 0;
            resize: none;
            outline: none;
            max-height: 120px;
        }
        .send-button {
            background: var(--accent);
            border: none;
            border-radius: 40px;
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            cursor: pointer;
            transition: 0.2s;
        }
        .send-button:disabled { opacity: 0.5; cursor: not-allowed; }
        /* 右侧抽屉 */
        .drawer {
            position: fixed;
            top: 0;
            right: -480px;
            width: 480px;
            height: 100%;
            background: var(--drawer-bg);
            border-left: 1px solid var(--border-light);
            transition: right 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            z-index: 200;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            box-shadow: -5px 0 20px rgba(0,0,0,0.1);
        }
        .drawer.open { right: 0; }
        .drawer-header {
            padding: 20px;
            border-bottom: 1px solid var(--border-light);
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: 600;
        }
        .drawer-content { padding: 20px; flex: 1; overflow-y: auto; }
        .connection-list { margin-bottom: 24px; }
        .connection-item {
            background: var(--hover-bg);
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 8px;
            cursor: pointer;
            transition: 0.1s;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .connection-item:hover { background: var(--active-bg); }
        .connection-item.active { border-left: 3px solid var(--accent); background: var(--active-bg); }
        .connection-name { font-weight: 500; font-size: 0.85rem; }
        .connection-detail { font-size: 0.7rem; color: var(--text-secondary); margin-top: 2px; }
        .connection-actions { display: flex; gap: 8px; }
        .new-connection-btn {
            width: 100%;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 40px;
            padding: 10px;
            margin: 12px 0;
            cursor: pointer;
        }
        .form-group { margin-bottom: 16px; }
        .form-group label {
            display: block;
            font-size: 0.75rem;
            font-weight: 500;
            margin-bottom: 6px;
            color: var(--text-secondary);
        }
        .form-group input, .form-group select {
            width: 100%;
            background: var(--input-bg);
            border: 1px solid var(--border-light);
            border-radius: 12px;
            padding: 10px 12px;
            color: var(--text-primary);
            font-size: 0.85rem;
            outline: none;
        }
        .platform-select {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 16px;
        }
        .platform-option {
            background: var(--hover-bg);
            border-radius: 40px;
            padding: 6px 14px;
            font-size: 0.8rem;
            cursor: pointer;
            transition: 0.1s;
        }
        .platform-option.selected { background: var(--accent); color: white; }
        .model-load-row {
            display: flex;
            gap: 8px;
            align-items: center;
        }
        .model-load-row select { flex: 1; }
        .load-models-btn {
            background: var(--hover-bg);
            border: none;
            border-radius: 40px;
            padding: 8px 12px;
            cursor: pointer;
            font-size: 0.75rem;
        }
        .param-slider {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .param-slider input { flex: 1; }
        .param-value {
            width: 60px;
            text-align: center;
            font-size: 0.85rem;
            cursor: pointer;
            background: var(--hover-bg);
            border-radius: 20px;
            padding: 2px 4px;
        }
        .param-value.editing {
            background: var(--accent);
            color: white;
            outline: none;
        }
        .param-reset {
            background: transparent;
            border: 1px solid var(--border-light);
            border-radius: 20px;
            padding: 4px 12px;
            cursor: pointer;
            font-size: 0.7rem;
        }
        .param-reset:hover { background: var(--hover-bg); }
        .overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(2px);
            z-index: 150;
            display: none;
        }
        .overlay.active { display: block; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(6px); }
            to { opacity: 1; transform: translateY(0); }
        }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: var(--hover-bg); }
        ::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 10px; }
        @media (max-width: 700px) {
            .sidebar { display: none; }
            .mobile-menu-btn { display: flex; }
            .chat-header { padding-left: 60px; }
            .drawer { width: 90%; right: -90%; }
            .message { max-width: 95%; }
        }
    </style>
</head>
<body>
<div class="app-layout">
    <!-- 桌面端侧边栏 -->
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <button class="new-chat-btn" id="newChatBtn"><i class="fas fa-plus"></i><span>新建对话</span></button>
            <button class="toggle-sidebar-btn" id="toggleSidebarBtn"><i class="fas fa-chevron-left"></i></button>
        </div>
        <div class="sessions-list" id="sessionsList"></div>
        <div class="sidebar-footer">
            <button class="api-config-btn" id="sidebarApiConfigBtn"><i class="fas fa-plug"></i><span>API 配置</span></button>
        </div>
    </div>
    <!-- 移动端覆盖式菜单 -->
    <div class="mobile-menu-btn" id="mobileMenuBtn"><i class="fas fa-bars"></i></div>
    <div class="mobile-menu-overlay" id="mobileOverlay"></div>
    <div class="mobile-sidebar" id="mobileSidebar">
        <div class="sidebar-header">
            <button class="new-chat-btn" id="mobileNewChatBtn"><i class="fas fa-plus"></i><span>新建对话</span></button>
        </div>
        <div class="sessions-list" id="mobileSessionsList"></div>
        <div class="sidebar-footer">
            <button class="api-config-btn" id="mobileApiConfigBtn"><i class="fas fa-plug"></i><span>API 配置</span></button>
        </div>
    </div>
    <div class="main-chat">
        <div class="chat-header">
            <div class="model-badge" id="currentModelBadge"><i class="fas fa-microchip"></i> 未选择模型</div>
            <div class="header-right">
                <button class="icon-btn" id="openApiDrawerBtn"><i class="fas fa-plug"></i></button>
                <button class="icon-btn" id="openParamsDrawerBtn"><i class="fas fa-sliders-h"></i></button>
                <button class="icon-btn" id="themeToggleBtn"><i class="fas fa-moon"></i></button>
            </div>
        </div>
        <div class="messages-container" id="messagesContainer"></div>
        <div class="input-area">
            <div class="input-options">
                <label class="option-switch"><input type="checkbox" id="deepThinkCheckbox"> 深度思考</label>
                <label class="option-switch"><input type="checkbox" id="webSearchCheckbox"> 智能搜索</label>
            </div>
            <div class="input-wrapper">
                <textarea id="messageInput" rows="1" placeholder="输入消息... (点击发送按钮发送)"></textarea>
                <button class="send-button" id="sendBtn"><i class="fas fa-paper-plane"></i></button>
            </div>
        </div>
    </div>
</div>
<div class="overlay" id="drawerOverlay"></div>

<!-- API 管理抽屉 -->
<div class="drawer" id="apiDrawer">
    <div class="drawer-header">
        <span><i class="fas fa-link"></i> API 连接管理</span>
        <button class="icon-btn" id="closeApiDrawerBtn"><i class="fas fa-times"></i></button>
    </div>
    <div class="drawer-content">
        <div class="connection-list" id="connectionList"></div>
        <button class="new-connection-btn" id="newConnectionBtn"><i class="fas fa-plus"></i> 新建连接</button>
        <div id="newConnectionForm" style="display: none;">
            <div class="form-group">
                <label>连接名称</label>
                <input type="text" id="connName" placeholder="例如: DeepSeek官方">
            </div>
            <label>选择模型平台</label>
            <div class="platform-select" id="platformSelect">
                <div class="platform-option" data-platform="openai">OpenAI</div>
                <div class="platform-option" data-platform="deepseek">DeepSeek</div>
                <div class="platform-option" data-platform="gemini">Gemini</div>
                <div class="platform-option" data-platform="grok">Grok</div>
                <div class="platform-option" data-platform="claude">Claude</div>
                <div class="platform-option" data-platform="doubao">豆包</div>
                <div class="platform-option" data-platform="openrouter">OpenRouter</div>
                <div class="platform-option" data-platform="custom">自定义 (OpenAI协议)</div>
            </div>
            <div id="customFields" style="display: none;">
                <div class="form-group"><label>API URL</label><input type="text" id="customUrl" placeholder="https://api.openai.com/v1"></div>
                <div class="form-group"><label>API Key</label><input type="password" id="customKey" placeholder="sk-..."></div>
            </div>
            <div id="platformFields" style="display: block;">
                <div class="form-group"><label>API Key</label><input type="password" id="platformKey" placeholder="请输入API密钥"></div>
            </div>
            <div class="form-group">
                <label>模型选择</label>
                <div class="model-load-row">
                    <select id="modelSelect"></select>
                    <button class="load-models-btn" id="loadModelsBtn"><i class="fas fa-sync-alt"></i> 加载列表</button>
                </div>
                <div id="manualModelContainer" style="margin-top: 8px;"></div>
            </div>
            <button class="new-connection-btn" id="saveConnectionBtn" style="margin-top: 8px;">保存连接</button>
            <button class="new-connection-btn" id="cancelEditBtn" style="margin-top: 8px; background: var(--text-secondary); display: none;">取消编辑</button>
        </div>
    </div>
</div>

<!-- 参数设置抽屉（新增最大 token 滑块） -->
<div class="drawer" id="paramsDrawer">
    <div class="drawer-header">
        <span><i class="fas fa-sliders-h"></i> 模型参数设置</span>
        <button class="icon-btn" id="closeParamsDrawerBtn"><i class="fas fa-times"></i></button>
    </div>
    <div class="drawer-content">
        <div class="form-group">
            <label>温度 (Temperature)</label>
            <div class="param-slider">
                <input type="range" id="tempSlider" min="0" max="2" step="0.1" value="0.7">
                <span class="param-value" id="tempValue" data-param="temp">0.7</span>
                <button class="param-reset" data-param="temperature">重置</button>
            </div>
        </div>
        <div class="form-group">
            <label>Top P</label>
            <div class="param-slider">
                <input type="range" id="topPSlider" min="0" max="1" step="0.05" value="1">
                <span class="param-value" id="topPValue" data-param="topP">1.0</span>
                <button class="param-reset" data-param="topP">重置</button>
            </div>
        </div>
        <div class="form-group">
            <label>Top K</label>
            <div class="param-slider">

    // 参数手动输入功能
    function setupManualInput(element, paramName, callback) {
        element.addEventListener('click', (e) => {
            e.stopPropagation();
            const oldVal = element.innerText;
            const input = document.createElement('input');
            input.type = 'text';
            input.value = oldVal;
            input.classList.add('param-value', 'editing');
            input.style.width = element.offsetWidth + 'px';
            element.replaceWith(input);
            input.focus();
            input.addEventListener('blur', () => {
                let newVal = parseFloat(input.value);
                if (isNaN(newVal)) newVal = modelParams[paramName];
                else {
                    if (paramName === 'maxTokens') newVal = Math.min(4096, Math.max(1, Math.floor(newVal)));
                    else if (paramName === 'temperature') newVal = Math.min(2, Math.max(0, newVal));
                    else if (paramName === 'topP') newVal = Math.min(1, Math.max(0, newVal));
                    else if (paramName === 'topK') newVal = Math.min(100, Math.max(1, Math.floor(newVal)));
                    else if (paramName === 'frequencyPenalty' || paramName === 'presencePenalty') newVal = Math.min(2, Math.max(-2, newVal));
                }
                modelParams[paramName] = newVal;
                updateParamSliders();
                saveAll();
                const newSpan = document.createElement('span');
                newSpan.className = 'param-value';

            });
        });

    async function sendMessageStream(userMessage, isRegenerate) {
        const conn = apiConnections.find(c => c.id === currentConnectionId);
        if (!conn) { alert("请先选择API连接"); return false; }
        let apiUrl = conn.url || getPlatformUrl(conn.platform);
        const apiKey = conn.apiKey;
        const model = conn.model;
        if (!apiUrl || !apiKey || !model) { alert("API连接信息不完整"); return false; }
        const endpoint = apiUrl.replace(/\/+$/, '') + '/chat/completions';
        const session = sessions.find(s => s.id === currentSessionId);
        const messagesPayload = [];
        for (let msg of session.messages) messagesPayload.push({ role: msg.role, content: msg.content });
        messagesPayload.push({ role: 'user', content: userMessage });
        
        const requestBody = {
            model: model,
            messages: messagesPayload,
            temperature: modelParams.temperature,
            top_p: modelParams.topP,
            top_k: modelParams.topK,
            frequency_penalty: modelParams.frequencyPenalty,
            presence_penalty: modelParams.presencePenalty,
            max_tokens: modelParams.maxTokens,
            stream: true
        };
        if (deepThinkCheckbox.checked) requestBody.reasoning_effort = 'medium';
        if (webSearchCheckbox.checked) requestBody.web_search = true;
        
        isLoading = true;
        sendBtn.disabled = true;
        const controller = new AbortController();
        abortController = controller;
        const timeoutId = setTimeout(() => controller.abort(), 60000);
        
        try {
            const response = await fetch(endpoint, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${apiKey}` },
                body: JSON.stringify(requestBody),
                signal: controller.signal
            });
            clearTimeout(timeoutId);
            if (!response.ok) throw new Error(`API错误: ${response.status}`);
            
            if (!isRegenerate) addMessageToCurrent('user', userMessage);
            const sessionNow = sessions.find(s => s.id === currentSessionId);
            const placeholderIdx = sessionNow.messages.push({ role: 'assistant', content: '', thinking: '', thinkingCollapsed: true }) - 1;
            const placeholderMsg = createMessageElement({ role: 'assistant', content: '', thinking: '' }, placeholderIdx);
            messagesContainer.appendChild(placeholderMsg);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
            
            const reader = response.body.getReader();
            const decoder = new TextDecoder('utf-8');
            let fullContent = '';
            let fullThinking = '';
            let buffer = '';
            let thinkingStarted = false;
            let startTime = null;
            
            while (true) {
                const { done, value } = await reader.read();
                if (done) break;
                buffer += decoder.decode(value, { stream: true });
                const lines = buffer.split('\n');
                buffer = lines.pop();
                for (const line of lines) {
                    const trimmed = line.trim();
                    if (!trimmed || trimmed === 'data: [DONE]') continue;
                    if (trimmed.startsWith('data: ')) {
                        try {
                            const jsonStr = trimmed.slice(6);
                            const chunk = JSON.parse(jsonStr);
                            const delta = chunk.choices[0]?.delta;
                            if (delta) {
                                if (delta.reasoning_content) {
                                    if (!thinkingStarted) {
                                        thinkingStarted = true;
                                        startTime = Date.now();
                                    }
                                    fullThinking += delta.reasoning_content;
                                }
                                if (delta.content) {
                                    if (thinkingStarted && !fullContent && fullThinking) {
                                        const thinkingTime = (Date.now() - startTime) / 1000;
                                        const currSession = sessions.find(s => s.id === currentSessionId);
                                        if (currSession && currSession.messages[placeholderIdx]) {
                                            currSession.messages[placeholderIdx].thinkingTime = thinkingTime;
                                        }
                                    }
                                    fullContent += delta.content;
                                }
                                const currSession = sessions.find(s => s.id === currentSessionId);
                                if (currSession && currSession.messages[placeholderIdx]) {
                                    currSession.messages[placeholderIdx].content = fullContent;
                                    if (fullThinking) currSession.messages[placeholderIdx].thinking = fullThinking;
                                    if (!currSession.messages[placeholderIdx].thinkingTime && thinkingStarted && startTime && fullContent && fullThinking) {
                                        currSession.messages[placeholderIdx].thinkingTime = (Date.now() - startTime) / 1000;
                                    }
                                    // 局部更新DOM（同前）
                                    const msgElements = messagesContainer.querySelectorAll('.message');
                                    if (msgElements[placeholderIdx]) {
                                        const wrapper = msgElements[placeholderIdx].querySelector('.message-content-wrapper');
                                        if (wrapper) {
                                            let contentHtml = '';
                                            if (fullThinking) {
                                                const collapsedClass = currSession.messages[placeholderIdx].thinkingCollapsed ? 'collapsed' : '';
                                                contentHtml = `<div class="thinking-block" data-thinking-idx="${placeholderIdx}"><div class="thinking-content ${collapsedClass}">${escapeHtml(fullThinking)}</div><button class="thinking-toggle"><i class="fas ${currSession.messages[placeholderIdx].thinkingCollapsed ? 'fa-chevron-down' : 'fa-chevron-up'}"></i></button></div>`;
                                                if (currSession.messages[placeholderIdx].thinkingTime) {
                                                    contentHtml += `<div class="thinking-time">深度思考 用时 ${currSession.messages[placeholderIdx].thinkingTime.toFixed(1)} 秒</div>`;
                                                }
                                            }
                                            contentHtml += `<div class="message-content">${escapeHtml(fullContent)}</div>`;
                                            const actionsDiv = wrapper.querySelector('.message-actions');
                                            wrapper.innerHTML = contentHtml;
                                            if (actionsDiv) wrapper.appendChild(actionsDiv);
                                            const newBlock = wrapper.querySelector('.thinking-block');
                                            if (newBlock) {
                                                const toggle = newBlock.querySelector('.thinking-toggle');
                                                if (toggle) {
                                                    toggle.addEventListener('click', (e) => {
                                                        e.stopPropagation();
                                                        const contentDiv = newBlock.querySelector('.thinking-content');
                                                        if (contentDiv) {
                                                            contentDiv.classList.toggle('collapsed');
                                                            const icon = toggle.querySelector('i');
                                                            if (icon) icon.className = contentDiv.classList.contains('collapsed') ? 'fas fa-chevron-down' : 'fas fa-chevron-up';
                                                            const curr = sessions.find(s => s.id === currentSessionId);
                                                            if (curr && curr.messages[placeholderIdx]) {
                                                                curr.messages[placeholderIdx].thinkingCollapsed = contentDiv.classList.contains('collapsed');
                                                                saveAll();
                                                            }
                                                        }
                                                    });
                                                }
                                            }
                                        }
                                    }
                                }
                            }
                        } catch(e) {}
                    }
                }
            }
            const finalSession = sessions.find(s => s.id === currentSessionId);
            if (finalSession && finalSession.messages[placeholderIdx] && !finalSession.messages[placeholderIdx].content) {
                finalSession.messages[placeholderIdx].content = fullContent || "(无回复)";
                if (thinkingStarted && !finalSession.messages[placeholderIdx].thinkingTime) {
                    finalSession.messages[placeholderIdx].thinkingTime = (Date.now() - startTime) / 1000;
                }
            }
            saveAll();
            return true;
        } catch (err) {
            alert(`发送失败: ${err.message}`);
            const sess = sessions.find(s => s.id === currentSessionId);
            if (sess && sess.messages.length && sess.messages[sess.messages.length-1]?.role === 'assistant' && !sess.messages[sess.messages.length-1].content) {
                sess.messages.pop();
                renderMessages();
            }
            return false;
        } finally {
            isLoading = false;
            sendBtn.disabled = false;
            abortController = null;
        }
    }
    
    async function onSend() {
        if (isLoading) { alert("正在处理中..."); return; }
        if (!currentConnectionId) { alert("请先在API连接管理中创建并选中一个连接"); return; }
        const raw = messageInput.value.trim();
        if (!raw) return;
        messageInput.value = '';
        await sendMessageStream(raw);
        messageInput.focus();
    }
