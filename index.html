<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>妈妈生日快乐 ❤️</title>

<style>
body{
  margin:0;
  font-family:"Microsoft YaHei",sans-serif;
  background:linear-gradient(135deg,#ffd1dc,#cce7ff);
  text-align:center;
  color:#333;
}

.container{
  padding:40px 20px;
}

h1{
  font-size:32px;
  margin-top:20px;
  animation:fadeIn 2s;
}

p{
  font-size:18px;
  margin:20px 0;
  line-height:1.6;
  animation:fadeIn 3s;
}

button{
  padding:12px 24px;
  border:none;
  border-radius:25px;
  background:#4da6ff;
  color:white;
  font-size:16px;
  cursor:pointer;
  transition:0.3s;
}

button:hover{
  background:#1a8cff;
}

.heart{
  font-size:40px;
  animation:beat 1s infinite;
}

@keyframes beat{
  0%{transform:scale(1);}
  50%{transform:scale(1.2);}
  100%{transform:scale(1);}
}

@keyframes fadeIn{
  from{opacity:0;}
  to{opacity:1;}
}

.hidden{
  display:none;
  margin-top:20px;
  font-size:20px;
  color:#ff4d6d;
}
</style>
</head>

<body>

<div class="container">
  <div class="heart">❤️</div>

  <h1>妈妈，生日快乐！</h1>

  <p>
    今天是属于你的特别一天<br>
    谢谢你一直以来的付出与陪伴<br>
    你是我最重要的人 ❤️
  </p>

  <button onclick="showMessage()">点我一下</button>

  <div id="msg" class="hidden">
    妈妈，我爱你！愿你每天都开心、健康、幸福！🎂
  </div>
</div>

<script>
function showMessage(){
  document.getElementById("msg").style.display="block";
}
</script>

</body>
</html>
